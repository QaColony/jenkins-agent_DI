---
name: Bump the Jenkins remoting version

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      branch: "{{ .github.branch }}"

sources:
  lastVersion:
    kind: githubrelease
    name: Get the latest version of the Jenkins remoting
    spec:
      owner: jenkinsci
      repository: remoting
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      versionfilter:
        kind: latest

conditions:
  checkJarIsAvailable:
    kind: shell
    name: Check that the JAR file for remoting is available
    disablesourceinput: true
    spec:
      command: curl --silent --show-error --location --verbose --output /dev/null --fail https://repo.jenkins-ci.org/public/org/jenkins-ci/main/remoting/{{ source "lastVersion" }}/remoting-{{ source "lastVersion" }}.jar

targets:
  updateDockerfiles:
    name: Bump the Jenkins remoting version in all Dockerfiles
    kind: dockerfile
    spec:
      files:
        - alpine/Dockerfile
        - debian/Dockerfile
        - debian/Dockerfile
        - windows/nanoserver/Dockerfile
        - windows/windowsservercore/Dockerfile
      instruction:
        keyword: ARG
        matcher: VERSION
    scmid: default
  setDockerBakeDefaultParentImage:
    name: Bump the Jenkins remoting version on the docker-bake.hcl file
    kind: hcl
    spec:
      file: docker-bake.hcl
      path: variable.REMOTING_VERSION.default
    scmid: default
  setLinuxBuildShRemotingVersion:
    name: Bump the Jenkins remoting version on the linux build.sh file
    kind: file
    spec:
      file: build.sh
      matchpattern: >-
        remoting_version="(.*)"
      replacepattern: >-
        remoting_version="{{ source "lastVersion" }}"
    scmid: default
  setWindowsBuildPwshRemotingVersion:
    name: Bump the Jenkins remoting version on the windows make.ps1 file
    kind: file
    spec:
      file: make.ps1
      matchpattern: >-
        \$RemotingVersion(.*)=(.*),
      replacepattern: >-
        $$RemotingVersion${1}= '{{ source "lastVersion" }}',
    scmid: default
  updateJenkinsfileRemotingVersion:
    name: "Update the remoting version in Jenkinsfile"
    kind: file
    spec:
      file: Jenkinsfile
      matchpattern: >-
        def remotingVersion = '(.*)'
      replacepattern: >-
        def remotingVersion = '{{ source "lastVersion" }}'
    scmid: default
  updateReadmeRemotingVersion:
      name: "Update the remoting version in the README.md file"
      kind: file
      spec:
        file: README.md
        matchpattern: >-
          (.*)"VERSION":\s"(.*)"(.*)
        replacepattern: '$1"VERSION": "{{ source "lastVersion" }}"$3'
      scmid: default

actions:
  default:
    kind: github/pullrequest
    scmid: default
    title: Bump the Jenkins remoting version to {{ source "lastVersion" }}
    spec:
      labels:
        - dependencies
        - remoting
